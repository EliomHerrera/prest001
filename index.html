<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/mainIndex.css">
</head>

<body>
    <div class="container-center">

        <header class="header">
            <div class="header-title"><a>EliomPrestamos</a></div>

            <div class="menu">
                <div class="menu-title">Menu</div>

                <ul class="menu-content">
                    <li class="menu-item"><a href="./index.html">Inicio</a></li>
                    <li class="menu-item"><a href="./admin/pagos.html">Pagos</a></li>
                    <li class="menu-item"><a href="./admin/tiket.html">Tiket</a></li>
                </ul>

            </div>
        </header>

        <main class="main">
            <h1 class="main-title">Eliom Provando Todo</h1>
            <div class="main-content">
                <div class="main-item">

                    <fieldset class="form">
                        <h3 class="form-title">Formulario</h3>

                        <div class="form-content">
                            <div class="form-item">
                                <label for="nombre">Nombre</label>
                                <input class="input" type="text" id="nombre">
                            </div>
                            <div class="form-item">
                                <label for="cantidad">Cantidad</label>
                                <input class="input" type="text" id="cantidad">
                            </div>
                            <div class="form-item">
                                <label for="metodo">Metodo
                                    <select class="select" id="metodo">
                                        <option class="select-item" selected>Seleccionar</option>
                                        <option class="select-item" value="diario 24">Diario 24</option>
                                        <option class="select-item" value="diario 30">Diario 30</option>
                                        <option class="select-item" value="semanal">Semanal</option>
                                    </select>
                                </label>
                            </div>

                            <div class="btn-content">
                                <button id="fnSend" class="btn-item">Enviar</button>
                            </div>

                        </div>
                    </fieldset>

                    <table class="table">
                        <thead>
                            <tr>
                                <th class="table-title">Nombre</th>
                                <th class="table-title">Cantidad</th>
                                <th class="table-title">Metodo</th>
                                <th class="table-title">X</th>
                            </tr>
                        </thead>
                        <tbody id="tablaDeudor">
                            <tr class="table-content">
                                <td class="table-item">xsss</td>
                                <td class="table-item">xddd</td>
                                <td class="table-item">xfff</td>
                                <td class="table-item">xggg</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>


    </div>
</body>

<script src="./js/main.js"></script>
<script src="./js/mainIndex.js"></script>

</html>
