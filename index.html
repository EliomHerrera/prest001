<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliomPrestamos</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/mainUser.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-title"><a>EliomPrestamos</a></div>

            <div class="menu">
                <div class="menu-title">menu</div>

                <ul class="menu-content">
                    <li class="menu-item"><a class="header-item">Inicio</a></li>
                    <li class="menu-item"><a class="header-item">Pagos</a></li>
                    <li class="menu-item"><a class="header-item">Tiket</a></li>
                </ul>
            </div>

        </header>

        <main class="main">
            <h1 class="main-title">Eliom Prestamos</h1>

            <div class="main-content">
                <div class="main-item">

                    <fieldset class="form">
                        <h3 class="form-title">
                            Formulario
                        </h3>

                        <div class="form-content">
                            <div class="form-item">
                                <label for="nombre">nombre
                                    <input class="input-t2" type="text" id="nombre">
                                </label>
                            </div>
                            <div class="form-item">
                                <label for="cantidad">cantidad
                                    <input class="input-t2" type="text" id="cantidad">
                                </label>
                            </div>
                            <div class="form-item">
                                <label for="metodo">metodo
                                    <select class="select" id="metodo">
                                        <option class="select-item" selected>Seleccionar</option>
                                        <option class="select-item" value="diario 24">Diario 24</option>
                                        <option class="select-item" value="diario 30">Diario 30</option>
                                        <option class="select-item" value="semanal">Semanal</option>
                                    </select>
                                </label>
                            </div>

                            <button class="btn" id="fnSend">Enviar</button>
                        </div>

                    </fieldset>

                    <table class="table">
                        <thead>
                            <tr>
                                <th class="table-title">Nombre</th>
                                <th class="table-title">Cantidad</th>
                                <th class="table-title">Metodo</th>
                                <th class="table-title">X</th>
                            </tr>
                        </thead>
                        <tbody id="tablaDeudor">
                            <tr class="table-content">
                                <td class="table-item">x</td>

                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="main-item">
                    <table class="table">
                        <thead>
                            <tr>
                                <th class="table-title">Nombre</th>
                                <th class="table-title">Monto</th>
                                <th class="table-title">Restante</th>
                                <th class="table-title">C/Pago</th>
                                <th class="table-title">Pagar</th>
                            </tr>
                        </thead>

                        <tbody id="tablaPagos">
                            <tr class="table-content">
                                <td class="table-item">x</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="main-item">
                    <h3>Tiket</h3>
                    <div id="tiket">

                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

<script src="js/main.js"></script>
<script src="js/mainUser.js"></script>

</html>
